<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .float { transform-origin:80px 80px; animation: floaty 1.35s ease-in-out 0.28s infinite alternate; }
    .pop { transform-origin:80px 118px; animation: pop 1.1s ease-in-out 0.28s infinite alternate; }
    .shine { animation: shine 1.6s ease-in-out 0.28s infinite; }
    @keyframes floaty { from { transform: translateY(3px) scale(.98) rotate(-2deg); } to { transform: translateY(-4px) scale(1.03) rotate(2deg); } }
    @keyframes pop { from { transform: scale(.96); opacity:.92; } to { transform: scale(1.04); opacity:1; } }
    @keyframes shine { 0%,100% { opacity:.25; transform:translateX(-4px); } 50% { opacity:.85; transform:translateX(4px); } }
  </style>
  <rect width="160" height="160" rx="34" fill="#FFF1F2"/>
  <circle class="shine" cx="37" cy="35" r="6" fill="#F9737A"/>
  <circle class="shine" cx="126" cy="124" r="5" fill="#F9737A" opacity=".6"/>
  <circle class="float" cx="80" cy="76" r="44" fill="#F9737A" opacity="0.9"/><path d="M56 76 l15 15 l34 -38" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <rect class="pop" x="20" y="103" width="120" height="39" rx="19.5" fill="#fff" stroke="#F9737A" stroke-width="4"/>
  <text x="80" y="129" text-anchor="middle" font-size="28" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="800" fill="#BE123C">好运来</text>
  <text x="80" y="25" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" font-weight="700" fill="#BE123C" opacity=".42">yes</text>
</svg>
