<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .float { transform-origin:80px 80px; animation: floaty 1.35s ease-in-out 0.14s infinite alternate; }
    .pop { transform-origin:80px 118px; animation: pop 1.1s ease-in-out 0.14s infinite alternate; }
    .shine { animation: shine 1.6s ease-in-out 0.14s infinite; }
    @keyframes floaty { from { transform: translateY(3px) scale(.98) rotate(-2deg); } to { transform: translateY(-4px) scale(1.03) rotate(2deg); } }
    @keyframes pop { from { transform: scale(.96); opacity:.92; } to { transform: scale(1.04); opacity:1; } }
    @keyframes shine { 0%,100% { opacity:.25; transform:translateX(-4px); } 50% { opacity:.85; transform:translateX(4px); } }
  </style>
  <rect width="160" height="160" rx="34" fill="#EFF6FF"/>
  <circle class="shine" cx="37" cy="35" r="6" fill="#60A5FA"/>
  <circle class="shine" cx="126" cy="124" r="5" fill="#60A5FA" opacity=".6"/>
  <path class="float" d="M39 54 h82 a16 16 0 0 1 16 16 v31 a16 16 0 0 1 -16 16 H39 a16 16 0 0 1 -16 -16 V70 a16 16 0 0 1 16 -16Z" fill="#60A5FA" opacity="0.9"/><path d="M48 54 v63 M112 54 v63" stroke="#fff" stroke-width="5" opacity="0.45"/>
  <rect class="pop" x="20" y="103" width="120" height="39" rx="19.5" fill="#fff" stroke="#60A5FA" stroke-width="4"/>
  <text x="80" y="129" text-anchor="middle" font-size="28" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="800" fill="#1D4ED8">麻烦啦</text>
  <text x="80" y="25" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" font-weight="700" fill="#1D4ED8" opacity=".42">nice</text>
</svg>
